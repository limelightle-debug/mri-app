<title>Market Risk Index</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a1a; color:#fff; font-family:Arial,sans-serif; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
  input[type=number] { -moz-appearance:textfield; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState } = React;

// =============================================
// 計算関数
// =============================================
const normalCDF = (z) => {
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign=z<0?-1:1,x=Math.abs(z)/Math.sqrt(2),t=1/(1+p*x);
  const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return 0.5*(1+sign*y);
};

const STATS = {
  vix: {logAve:1.243312, devAve:0.000939, sdev:0.124813},
  skew:{logAve:2.133416, devAve:0.013348, sdev:0.017442},
  cape:{trendLine:31.9614, devAve:0.192177, sdev:0.119482},
};

const calcVIXRisk  = (v,s) => { if(!v||v<=0)return null; const d=Math.log10(v)/s.logAve-1; return 1-normalCDF((d-s.devAve)/s.sdev); };
const calcSKEWRisk = (v,s) => { if(!v||v<=0)return null; const d=Math.log10(v)/s.logAve-1; return normalCDF((d-s.devAve)/s.sdev); };
const calcCAPERisk = (v,s) => { if(!v||v<=0)return null; const d=v/s.trendLine-1;           return normalCDF((d-s.devAve)/s.sdev); };
const calcMRI = (a,b,c) => a===null||b===null||c===null?null:(a+b+c)/3;



// =============================================
// UI ヘルパー
// =============================================
const getColor = v => {
  if(v===null)return"#444";
  if(v<0.2)return"#1a6b2a"; if(v<0.4)return"#4CAF50";
  if(v<0.6)return"#FFC107"; if(v<0.8)return"#FF5722";
  return"#B71C1C";
};
const getLevel = mri => {
  if(mri===null)return{label:"---",color:"#fff",bg:"#333"};
  if(mri<0.2)return{label:"Very Low",color:"#fff",bg:"#1a6b2a"};
  if(mri<0.4)return{label:"Low",color:"#fff",bg:"#4CAF50"};
  if(mri<0.6)return{label:"Medium",color:"#000",bg:"#FFC107"};
  if(mri<0.8)return{label:"High",color:"#fff",bg:"#FF5722"};
  return{label:"Very High",color:"#fff",bg:"#B71C1C"};
};

const getETLabel = () => {
  const now = new Date();
  const y = now.getUTCFullYear();
  const ds=new Date(Date.UTC(y,2,8)); ds.setUTCDate(8+(7-ds.getUTCDay())%7);
  const de=new Date(Date.UTC(y,10,1)); de.setUTCDate(1+(7-de.getUTCDay())%7);
  const isDST=now>=ds&&now<de;
  const et=new Date(now.getTime()+(isDST?-4:-5)*3600000);
  const dow=et.getUTCDay();
  if(dow===6)et.setUTCDate(et.getUTCDate()-1);
  if(dow===0)et.setUTCDate(et.getUTCDate()-2);
  const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  return `${et.getUTCFullYear()}/${et.getUTCMonth()+1}/${et.getUTCDate()} (${days[et.getUTCDay()]})`;
};

const SL=[{x:2.30,c:"#FF9800"},{x:16.35,c:"#4CAF50"},{x:83.65,c:"#4CAF50"},{x:97.70,c:"#FF9800"}];
const ANNS={
  skew:[{x:8,t:"Run-away"},{x:30,t:"Passive"},{x:50,t:"Position",b:true},{x:72,t:"Active"},{x:92,t:"All-in"}],
  vix: [{x:8,t:"Panic"},{x:28,t:"Fear"},{x:50,t:"Emotion",b:true},{x:72,t:"Greed"},{x:92,t:"Euphoria"}],
  cape:[{x:8,t:"Crash"},{x:28,t:"Crack"},{x:50,t:"Valuation",b:true},{x:72,t:"Froth"},{x:92,t:"Bubble"}],
};

function Bar({label, value, ann}) {
  const pct = value!==null ? value*100 : null;
  const col = getColor(value);
  return (
    <div style={{marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
        <span style={{color:"#ccc",fontSize:13,fontWeight:"bold"}}>{label}</span>
        <span style={{color:"#fff",fontSize:14,fontWeight:"bold"}}>{pct!==null?`${pct.toFixed(2)}%`:"---"}</span>
      </div>
      <div style={{position:"relative",height:13,marginBottom:1}}>
        {ann.map((a,i)=>(
          <div key={i} style={{position:"absolute",left:`${a.x}%`,transform:"translateX(-50%)",fontSize:a.b?9:8,color:a.b?"#999":"#777",fontStyle:"italic",whiteSpace:"nowrap",fontWeight:a.b?"bold":"normal"}}>{a.t}</div>
        ))}
      </div>
      <div style={{position:"relative",height:26,background:"#111127",borderRadius:6,overflow:"hidden",border:"1px solid #2a2a4a"}}>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to right,#1a6b2a,#4CAF50,#FFC107,#FF5722,#B71C1C)",opacity:0.12}}/>
        {pct!==null && <div style={{position:"absolute",top:0,left:0,bottom:0,width:`${Math.min(pct,100)}%`,background:col,opacity:0.82,transition:"width 0.4s ease"}}/>}
        {SL.map((s,i)=><div key={i} style={{position:"absolute",top:0,bottom:0,left:`${s.x}%`,width:1,background:s.c,opacity:0.9,zIndex:2}}/>)}
      </div>
      <div style={{position:"relative",height:28}}>
        {[
          {x:2.30, top:"-2σ", bot:"2.30%",  color:"#FF9800"},
          {x:16.35,top:"-1σ", bot:"16.35%", color:"#4CAF50"},
          {x:83.65,top:"+1σ", bot:"83.65%", color:"#4CAF50"},
          {x:97.70,top:"+2σ", bot:"97.70%", color:"#FF9800"},
        ].map((s,i)=>(
          <div key={i} style={{position:"absolute",left:`${s.x}%`,transform:"translateX(-50%)",textAlign:"center",lineHeight:1.4}}>
            <div style={{fontSize:9,color:s.color,fontWeight:"bold",whiteSpace:"nowrap"}}>{s.top}</div>
            <div style={{fontSize:8,color:s.color,opacity:0.75,whiteSpace:"nowrap"}}>{s.bot}</div>
          </div>
        ))}
      </div>
    </div>
  );
}
